<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaztelugatxe Map</title>
  <link rel="icon" href="./images/SJG_Icon.png">
  <link rel="stylesheet" href="./css/map.css" />
</head>

<body>
  <div class="map-page">
    <div class="map-wrap" id="mapWrap">
      <img src="./images/final-map.png" alt="Gaztelugatxe Map" class="map-base" />

      <button class="map-hotspot" style="top:36.5%; left:27.9%;" data-title="Gaztelugatxe"
        data-subtitle="Ermita de San Juan"
        data-body="A stunning islet connected by a man-made bridge. Home to the famous hermitage."
        aria-label="Gaztelugatxe">
      </button>

      <button class="map-hotspot" style="top:22%; left:65.4%;" data-title="Matxitxako" data-subtitle="Cape"
        data-body="Northern coastal viewpoint." aria-label="Matxitxako">
      </button>

      <button class="map-hotspot" style="top:79%; left:5%;" data-title="Bakio" data-subtitle="Beach town"
        data-body="Main access point and beach area." aria-label="Bakio">
      </button>

      <button class="map-hotspot" style="top:91%; left:86.7%;" data-title="Bermeo" data-subtitle="Fishing port"
        data-body="Historic coastal town with maritime heritage." aria-label="Bermeo">
      </button>

      <div id="hoverLens" class="hover-lens" hidden></div>

      <div id="hoverLabel" class="hover-label" hidden>
        <span id="hoverLabelText"></span>
      </div>

      <aside id="mapPanel" class="map-panel" hidden>
        <button id="closePanel" class="map-panel__close" type="button" aria-label="Close panel">×</button>
        <p id="panelType" class="map-panel__type">Location</p>
        <h2 id="panelTitle" class="map-panel__title"></h2>
        <p id="panelSubtitle" class="map-panel__subtitle"></p>
        <p id="panelBody" class="map-panel__body"></p>
        <div class="map-panel__tags">
          <span class="map-panel__tag">Scenic landmark</span>
        </div>
      </aside>
    </div>
  </div>

  <div class="legend-toggle" id="legendToggle">
    Map Legend
  </div>

  <div class="legend-panel" id="legendPanel" hidden>
    <div class="legend-panel__inner">
      <button class="legend-close" id="legendClose" type="button" aria-label="Close legend">×</button>
      <img src="./images/maplegend.svg"
        alt="Map legend for visitor services, transport, facilities, landmarks, and restrictions."
        class="legend-panel__image">
    </div>
  </div>

  <div class="legend-container" aria-label="Map interaction help">
    <div class="legend-hint">
      <span>Hover on markers | Click for details</span>
    </div>

    <script src="./js/map.js"></script>
</body>

</html>
